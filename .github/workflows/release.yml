name: Build and publish release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          version=$(sed -n 's/^PKG_VERSION="\([^"]*\)"/\1/p' scripts/build-ipk.sh)
          release=$(sed -n 's/^PKG_RELEASE="\([^"]*\)"/\1/p' scripts/build-ipk.sh)
          if [ -z "$version" ] || [ -z "$release" ]; then
            echo "Failed to read package version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build IPK
        shell: bash
        run: |
          chmod +x scripts/build-ipk.sh
          scripts/build-ipk.sh "$PWD/dist"

      - name: Build source archive
        shell: bash
        run: |
          tar --exclude=.git --exclude=dist -czf "dist/luci-app-minigate-v${{ steps.meta.outputs.version }}-src.tar.gz" .
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE: ${{ steps.meta.outputs.release }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          MiniGate v${VERSION}-${RELEASE}

          更新内容：
          - 登录防护页面保存设置时，改为执行 MiniGate 轻量重载，而不是完整重启。
          - 修复通过 MiniGate 反向代理访问 LuCI 时，保存登录防护设置后当前网页连接被反代 nginx 断开，导致浏览器显示“无法访问此网站”的问题。

          说明：
          - 旧版 Release 附件不会自动变化，请下载当前版本的 luci-app-minigate_${VERSION}-${RELEASE}_all.ipk。
          EOF
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "luci-app-minigate v${VERSION}" --notes-file release-notes.md --latest
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --target "$GITHUB_SHA" --title "luci-app-minigate v${VERSION}" --notes-file release-notes.md --latest
          fi
