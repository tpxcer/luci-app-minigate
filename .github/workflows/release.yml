name: Build and publish release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          version=$(sed -n 's/^PKG_VERSION="\([^"]*\)"/\1/p' scripts/build-ipk.sh)
          release=$(sed -n 's/^PKG_RELEASE="\([^"]*\)"/\1/p' scripts/build-ipk.sh)
          if [ -z "$version" ] || [ -z "$release" ]; then
            echo "Failed to read package version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build IPK
        shell: bash
        run: |
          chmod +x scripts/build-ipk.sh
          scripts/build-ipk.sh dist

      - name: Build source archive
        shell: bash
        run: |
          tar --exclude=.git --exclude=dist -czf "dist/luci-app-minigate-v${{ steps.meta.outputs.version }}-src.tar.gz" .
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE: ${{ steps.meta.outputs.release }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          MiniGate v${VERSION}-${RELEASE}

          Changes:
          - Login Guard settings now reload MiniGate instead of fully restarting it, avoiding reverse-proxy session drops while saving settings.
          EOF
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --target "$GITHUB_SHA" --title "luci-app-minigate v${VERSION}" --notes-file release-notes.md --latest
          fi
